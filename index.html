  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--accent); background: var(--accent-glow); }

    border: 1px solid var(--border); border-radius: 4px;

  .page-meta-badge.highlight {

    display: flex; gap: 0; border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted);
    padding: 12px 24px; cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── STORY TAB ── */
  .story-content {
    max-width: 900px; margin: 0 auto; padding: 40px 24px 60px;
  }

  .highlight-block {
  }

  .result-note {

  }
  .standings-title {
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    text-align: center; margin-top: 32px; margin-bottom: 8px;
  }
  .standings-wrapper {
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin: 24px 0;
  }
  .standings-table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  .standings-table th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted); text-align: left;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .standings-table td {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .standings-table .our-team td { color: var(--accent); font-weight: 600; }
  .standings-table .spacer-row td {
    border-bottom: none; padding: 4px 16px; color: var(--text-muted);

  .race-record-table { overflow-x: auto; }
  .race-record { font-size: 13px; }

  .race-record td { padding: 10px 12px; white-space: nowrap; }
  .race-record .rest-row td {

  .record-summary { text-align: center; }

    max-width: 1200px; margin: 0 auto; padding: 40px 24px 60px;

  .photos-grid {

    cursor: pointer; aspect-ratio: 3/2;

  .photos-grid .photo-item img {

  .story-photo {

  .story-photo img {
    width: 100%;
    display: block;
    transition: transform 0.5s ease;

  .story-photo:hover img { transform: scale(1.02); }

  .lightbox {

    align-items: center; cursor: zoom-out;

  .lightbox.open { display: flex; }
  .lightbox img {

  }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px; background: none;
    border: none; color: white; font-size: 32px; cursor: pointer;
    padding: 8px; line-height: 1;
  }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: white; font-size: 48px; line-height: 1; padding: 8px 16px;

  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }

  }

function tbl(rows, ourPos) {
  let h = '<table class="standings-table"><thead><tr><th>P</th><th>#</th><th>Driver</th><th>Time</th><th>Gap</th></tr></thead><tbody>';
  const posNum = parseInt(ourPos.replace('P',''));
  rows.forEach(r => {
    const rp = parseInt(r[0].replace('P',''));
    if (rp === posNum && posNum > 10) h += '<tr class="spacer-row"><td colspan="5">&mdash;</td></tr>';
    const cls = r[0] === ourPos && r[2] === 'P. Gon\u00e7alves' ? ' class="our-team"' : '';
    h += `<tr${cls}><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]||''}</td></tr>`;
  });
  return h + '</tbody></table>';
}

{id:'intro', navLabel:'Intro', tag:'Introduction', title:'The Journey to the Dakar',
 badges:['Pedro Gon\u00e7alves / Hugo Magalh\u00e3es','BBR Motorsport','Taurus T3 Max'],
 highlightBadges:['Car #306'],
 photoDirs:['Prologue'],
 story:`<p>On the 21st of April 2023, a 45-year-old Pedro Gon\u00e7alves climbed into a modest Yamaha YXZ1000R at a local cross-country raid in the hills of central Portugal. It was his absolute debut. Twenty months after that debut at Ferraria, he would line up at the start of the Dakar Rally.</p>
<p>The path between a Hobby race and the Dakar was paved with ambition and broken machinery. Two races in 2023: the Ferraria raid and the Baja Portalegre 500, where he finished P12 out of 13 in the SSV TT2 class, P42 out of 68 overall. Then six races in 2024, including his first taste of African desert at the Yamaha Desert Challenge in Morocco, where he finished second out of eight. His first W2RC round at Rally-Raid Portugal, P14 Challenger out of 32. But also three retirements, and a last-place finish in his class at Baja TT Norte de Portugal. The learning curve was steep and unforgiving.</p>
<div class="highlight-block"><p>He changed navigators, changed cars, changed teams. Pedro Ara\u00fajo in 2023. Rui Franco and Lu\u00eds Engeitado rotating through 2024. Then Hugo Magalh\u00e3es arrived for the Dakar 2025. Hugo was at the other end of the spectrum: a professional co-driver in stage rallies, including WRC, for the last 18 years.</p></div>
<p>The 2025 Dakar was Pedro and Hugo's rookie attempt, and it was not an easy debut. A broken clutch on Stage 6 dropped them into the Dakar Experience category, and the same issue struck again on Stage 11, leaving them out of the race. The disappointment was crushing. The setbacks kept coming. But then the Fenic gave way to a Taurus T3 Max when Pedro joined BBR Motorsport in July 2025. And suddenly: P6 Challenger at Rally-Raid Portugal, P5 at Baja Morocco, P5 at Rallye du Maroc. Three consecutive top-six category finishes to close the 2025 season.</p>
<p>Now it was January 3, 2026. His 48th birthday. And the second Dakar was about to begin.</p>
<p>Pedro's family was in Saudi Arabia, they spent some rest days together before the rally began. On January 3rd, their last day in Saudi, they would stood at the start podium and watch Pedro roll down the ramp into the desert, the beginning of the adventure they had all been building toward.</p>`,

 story:`<p>Before a single competitive kilometre, there was work to do. The first two days of January were dedicated to the rituals that precede every Dakar: the shakedown test, administrative checks, and technical scrutineering.</p>
<p>On January 1st, the shakedown \u2014 a short, controlled test run on a designated course near the bivouac. Not a race, but a chance to feel the car on Saudi terrain for the first time, to check that every system worked as intended after the long journey from Portugal. Suspension, engine response, navigation equipment, intercom \u2014 all tested under real conditions.</p>
<p>January 2nd was dedicated to the verifications. The team went through scrutineering in Yanbu. Every detail of the Taurus T3 Max was inspected \u2014 safety equipment, roll cage, harnesses, fire extinguishers, navigation instruments, tracking systems. The car had to comply with FIA regulations down to the millimetre. For Pedro and Hugo, it was also the moment to collect their credentials, verify documentation, and officially confirm their entry as car #306.</p>
<div class="highlight-block"><p>For BBR Motorsport, these two days were about making sure nothing was left to chance. The mechanics ran their final checks. Pedro and Hugo settled into their routines: seat position, harness tension, the rhythm of communication between driver and navigator. Everything had to be second nature before the flag dropped.</p></div>

 story:`<p>The magnificent sandy canyons of Al-Ula. The briefing had warned that navigation would play a leading role: tracks had largely disappeared on the empty plateaus, erased by months of rain. Winding gravel surfaces, with rhythms and terrain changing regularly between plateaus and canyons.</p>
<p>Starting 48th, Pedro and Hugo pushed through 421 kilometres and had a puncture. It cost them about five minutes. They still finished P6 Challenger on stage and climbed to P7 in the general, P45 overall out of nearly 200 cars. Their highest general classification position of the entire rally.</p>
<div class="highlight-block"><p>But there was a catch. Their stage time fell outside the 107% window compared to the Challenger stage winner. Under Dakar rules, that meant a pushback in the starting order for the next stage. Instead of starting around 48th again, matching their general classification, they would be shoved back in the queue.</p>
<p>And the next stage was the marathon.</p></div>`,

{id:'stage4', navLabel:'S4', tag:'Stage 4 \u00b7 Marathon 1a \u00b7 January 7', title:'The Marathon Begins',
 badges:['Al-Ula \u2192 Marathon Bivouac','452 km SS'],highlightBadges:['P16/36 CHG','+1:08:21'],
 photoDirs:['2026-01-07'],
 story:`<p>The first marathon stage. Sandy canyons off-piste, then flatter terrain with intense CAP navigation on rocky and rough plateaus, then magnificent sandy plateaus with alternating pace and winding tracks. After this stage, there would be no team, no mechanics, no support. Just a tent in the desert and a military ration.</p>
<p>Pedro and Hugo started 76th. Pushed back almost 30 positions from where they deserved to be by the 107% rule, behind several trucks and slower cars from other categories. More dust, more traffic, more vehicles clogging narrow tracks where overtaking was impossible.</p>
<div class="highlight-block"><p>Around KP 140, they had gotten caught in a queue of cars and trucks creeping through a narrow canyon section full of rocks. The car leading the queue made a navigation error, drifted off course, and Pedro followed. By the time they realized, it was too late. They had missed a waypoint. Pedro made the tactical call: not worth going back to search for it. Accept the 15-minute penalty and push on.</p></div>
<p>Around KP 231, shortly before the refueling point, they hit a narrow section. No more than five metres wide. Another car was stuck in the sand, blocking the passage. Pedro tried to squeeze past and the Taurus got wedged side by side with the other car, both buried in sand in a corridor barely wide enough for one vehicle. Twenty minutes. They sat there for twenty minutes while the rally drove on without them. Eventually, locals arrived with a 4x4 and a rope and pulled them free.</p>
<p>At the finish, the 15-minute waypoint penalty was applied to their time. Combined with the 20 minutes lost stuck and the time lost in the canyon queue, they finished P16 Challenger on stage, +1:08:21 from the stage winner. They lost roughly 45 minutes to incidents alone.</p>
<p>But the paradox of the Dakar: despite the worst stage of their rally, they climbed to P6 in the Challenger general classification. Others had suffered even more.</p>
<p>Pedro drove the Taurus into the marathon bivouac as the sun dropped behind the Saudi plateau. No team waiting. No mechanics. Just the desert, a refuge, and whatever they could carry.</p>`,

{id:'stage5', navLabel:'S5', tag:'Stage 5 \u00b7 Marathon 1b \u00b7 January 8', title:'Wounded but Standing',
 badges:['Marathon Bivouac \u2192 Ha\u2019il','356 km SS'],highlightBadges:['P21/36 CHG','+34:41'],
 photoDirs:['2026-01-08'],
 story:`<p>The second half of the marathon. Starting 103rd, the furthest back of the entire rally. Sandy winding tracks deteriorating into stony passages with complicated navigation. Large sandy valleys until the neutralisation, then rough terrain and small valleys demanding careful route-finding.</p>
<p>Three problems. A puncture. A 6-minute speed zone penalty, they were inside a restricted area and did not realize for a while, exactly the kind of trap the briefing had flagged. And in the final part of the stage, the steering partially broke.</p>
<p>They finished P21 Challenger on stage, +34:41 from the stage winner. Dropped from P6 to P9 in the general classification. Accumulated 21 minutes of penalties across two stages.</p>
<p>But they finished. They drove the wounded Taurus into the Ha\u2019il bivouac where, for the first time since leaving Al-Ula, the full BBR team and mechanics were waiting. The marathon was over. The mechanics replaced the broken steering and got to work preparing the car for the longest day of the rally.</p>`,

{id:'stage6', navLabel:'S6', tag:'Stage 6 \u00b7 January 9', title:'Into Riyadh',
 badges:['Ha\u2019il \u2192 Riyadh','326 km SS (920 km total)'],highlightBadges:['P11/36 CHG','+25:49'],
 photoDirs:['2026-01-09'],
 story:`<p>A 100% sand stage. Dunes all day. The briefing was unambiguous: alternating between high speed sections in the dunes and track sections between fast ergs, with broken dunes warned in the roadbook. The longest total stage of the rally at 920 kilometres including liaisons, though the timed section was 326 km. A refueling stop at two-thirds distance.</p>
<p>Starting 100th, still deep in the pack from the marathon fallout, Pedro and Hugo drove into the dunes with a new problem. The power steering was gradually failing. It was a different issue from the broken steering on Stage 5, which the mechanics had replaced. This was something progressive, the steering getting heavier and heavier throughout the stage. On a day of nothing but sand and dunes, where every direction change and every dune correction demands the steering to respond, the car was fighting Pedro with increasing force.</p>
<p>By the middle of the stage, Pedro was thinking the car was about to die. But it survived.</p>
<p>The final 10 kilometres were driven in the dark. The lights were not working properly, there was heavy dust, and the briefing had warned this was a difficult navigation zone. Starting 100th meant they were among the last to reach the finish, and by then the sun was gone.</p>
<p>They finished P11 Challenger on stage, +25:49. Held P9 in the general. Then came the longest liaison of the rally: the drive to Riyadh, and the rest day.</p>`,

{id:'rest', navLabel:'Rest', tag:'Rest Day', title:'Alive',
 badges:['Riyadh','January 10, 2026'],highlightBadges:['P9 CHG \u00b7 P52 Overall'],
 photoDirs:['2026-01-10'],
 story:`<p>P9 Challenger. P52 overall. Six stages done, seven to go. The mechanics had a full day to work on the Taurus: the power steering, the engine map selector that had not yet shown its worst, and the accumulated wear of a car that had been through canyons, dunes, broken steering, punctures, and 20 minutes wedged in a five-metre-wide passage.</p>
<p>Pedro arrived at the rest day with high morale. The first week had thrown everything at them: mechanical problems from Stage 1, a puncture on Stage 3, the canyon disaster on Stage 4, a marathon night in the desert, broken steering on Stage 5, power steering failing through dunes on Stage 6, driving the last 10 km in the dark. Six retirements in their career had taught Pedro and Hugo what mattered most. Not the position on the timing screen. Not the gap to the leader. Just the act of arriving at the next bivouac with a car that could start again the next morning.</p>
<div class="highlight-block"><p>They were P9 Challenger. Alive. And the second week had not started yet.</p></div>`,

{id:'stage7', navLabel:'S7', tag:'Stage 7 \u00b7 January 11', title:'Holding Ground',
 badges:['Riyadh \u2192 Wadi Ad-Dawasir','459 km SS'],highlightBadges:['P15/35 CHG','+18:13'],
 photoDirs:['2026-01-11'],
 story:`<p>The second week began with the longest southbound stage of the rally, overall very fast. Wide valleys with well-marked tracks to start, then high speed with tricky navigation through a region with many tracks, then off-piste sections where rocks became more present and the canyons narrowed. Dust was significant. Only the final kilometres would allow higher speeds again.</p>
<p>Before the selective section even started, Pedro and Hugo had to replace a tire by precaution. It had lost some pressure on the liaison.</p>
<p>Then came the main problem. The engine map selector was malfunctioning. From the beginning of the stage, it was randomly alternating between Map 2 (normal race power), Map 4 (reduced power, designed for lower octane fuel), and even Map 1, the lowest power setting, meant only for road liaisons, not racing. Pedro would be pushing through a fast valley at full pace and the engine would suddenly drop to liaison power. On a 459 km stage where speed was everything, the car was randomly sabotaging itself.</p>
<p>Despite the unpredictable power, they finished P15 Challenger, +18:13 from the stage winner. Dropped from P9 to P9 in the general, holding position.</p>`,

{id:'stage8', navLabel:'S8', tag:'Stage 8 \u00b7 January 12', title:'483 Kilometres',
 badges:['Wadi Ad-Dawasir','483 km SS'],highlightBadges:['P14/35 CHG','+22:36'],
 photoDirs:['2026-01-12'],
 story:`<p>The longest selective section of the entire 2026 Dakar. 483 kilometres through a complete and varied landscape: a fast start, then dune belts breaking the rhythm, spectacular valleys, rockier sections heading north, frequent terrain changes, and winding tracks. The briefing had called it beautiful. It was also relentless.</p>
<p>The engine map selector was still malfunctioning, randomly switching between power maps without warning. The same gremlin from Stage 7, unfixed. But Stage 8 brought something else: fatigue. Ten days into the rally, on the longest timed stage, Pedro felt the cumulative weight of everything. The shifting problems from Stage 1. The canyon disaster on Stage 4. The marathon nights. The failing power steering. The engine dropping power without reason. 483 kilometres is a long time to concentrate when your body is telling you it has had enough.</p>
<p>They finished P14 Challenger, +22:36. Held P10 in the general. The fatigue had a direct impact on the pace, but they managed the stage and kept the car intact heading into the second marathon.</p>`,

{id:'stage9', navLabel:'S9', tag:'Stage 9 \u00b7 Marathon 2a \u00b7 January 13', title:'Best of the Second Week',
 badges:['Wadi Ad-Dawasir \u2192 Marathon Refuge','410 km SS'],highlightBadges:['P8/35 CHG','+24:08'],
 photoDirs:['2026-01-13'],
 story:`<p>The second marathon sequence began. Generally fast terrain: canyons at the start, then open and faster sections, sand discreet at first but very soft in places, then dunes at the end. The common thread between all itineraries was sand.</p>
<div class="highlight-block"><p>Before the stage even started, drama. At the starting connection between the liaison and the selective section, the front brakes over-pressurized and completely locked the car. Pedro and Hugo could not move. They had to remove a wheel, disassemble the brake pads, release the pressure, and reassemble everything. A mechanical problem that had nothing to do with driving, solved with tools and composure in the dust at the side of the road.</p></div>
<p>Once the brakes were sorted, the 410-km selective section itself was clean. No problems. And the result showed it: P8 Challenger on stage, +24:08, their best second-week stage result. When the car worked and the crew was free from incidents, the pace was genuinely strong.</p>
<p>Pedro drove into the second marathon bivouac. Same routine as the first: Hugo checked the car, Pedro set up the tents, military rations, early to bed. No drama. The desert was becoming familiar.</p>`,

{id:'stage10', navLabel:'S10', tag:'Stage 10 \u00b7 Marathon 2b \u00b7 January 14', title:'The Strategic Choice',
 badges:['Marathon Refuge \u2192 Bisha','420 km SS'],highlightBadges:['P13/35 CHG','+35:50'],
 photoDirs:['2026-01-14'],
 story:`<p>The big sand stage. The briefing had presented it as the second dedicated sand stage of the rally, with categories starting in parallel facing the dunes. Regular dunes at first, with ergs and fast off-piste plateaus, but as the stage progressed the dunes changed character. Soft, demanding sand that required careful fuel management. Back-and-forth sections in a wadi crossing with fesh-fesh-like dust demanding vigilance. Orange dunes gaining height, with passages between dark rocks. Then faster plateaus and more winding, rockier sections to the finish.</p>
<p>Coming off the second marathon night with no mechanics, on a car that had been giving them problems all rally, Pedro and Hugo made a deliberate choice: be conservative. Protect the car. Protect the finish. Do not take risks in the soft dunes that could end the rally three days from Yanbu.</p>
<p>Looking back, it was probably too conservative. There was pace left on the table. But after everything that had happened, being careful on the hardest sand stage of the Dakar was a rational decision. They could afford to lose positions. They could not afford to lose the car.</p>
<p>They finished P13 Challenger, +35:50. Dropped from P8 to P11 in the general classification. The marathon was over. The full BBR team was waiting in Bisha. Three stages left.</p>`,

{id:'stage11', navLabel:'S11', tag:'Stage 11 \u00b7 January 15', title:'Two Stages to Go',
 badges:['Bisha \u2192 Al Henakiyah','346 km SS'],highlightBadges:['P16/33 CHG','+17:30'],
 photoDirs:['2026-01-15'],
 story:`<p>Plateaus with little variation in terrain, but one of the fastest stages of the 2026 edition. A very high average speed that had to be managed carefully to avoid navigation traps on the open terrain. Dust from previous days had swept across the tracks. Rocky sectors over the first 150 kilometres. Nomadic camps settled in the area.</p>
<p>The front brakes locked again at the road connection, the same over-pressurization problem from Stage 9. This time, the assistance team was there to help since the liaison was shared with the support vehicles, and support was allowed under the regulations. They fixed it before the selective section.</p>
<p>During the stage, there were minor problems with the intercom system, the helmet-mounted microphones and headphones that allow driver and navigator to communicate. On a stage where navigation traps on fast open terrain were the main danger, having communication issues between Pedro and Hugo added an extra layer of difficulty. Hugo needed to call out the roadbook instructions clearly, and Pedro needed to hear them.</p>
<p>Despite the brake scare and the intercom issues, the normalized pace was strong: about 5:04 per 100 km of gap, almost exactly their clean baseline. Once in the selective section, the car ran and the crew delivered. P16 Challenger, +17:30. Held P11 in the general. Two stages to go.</p>`,

{id:'stage12', navLabel:'S12', tag:'Stage 12 \u00b7 January 16', title:'280 km Without Brakes',
 badges:['Al Henakiyah \u2192 Yanbu','311 km SS'],highlightBadges:['P15/33 CHG','+32:43'],
 photoDirs:['2026-01-16'],
 story:`<p>The final exam. The briefing had called it a summary of all types of Saudi terrain, with no room for approximation: driving, navigation and technical crossings would make this day the ultimate challenge. Wide sliding tracks, then slower wadi crossings with rougher terrain. Dunes with soft sand. Narrow rocky technical sections, almost trial-like. More dunes, softer than the first. Valleys with rocks. Fast open terrain. Small difficult dunes. Then a very rough section to the finish. Everything the Dakar had to offer, compressed into 311 kilometres.</p>
<p>It became one of the hardest stages of the entire rally for car #306.</p>
<p>A puncture in the first 10 kilometres. Then, around KP 30, they lost pressure on the rear brakes. A leak in the rear brake circuit. Pedro and Hugo had to close the rear circuit entirely and drive the remaining 280 kilometres with only the front brakes, which were very weak.</p>
<p>280 kilometres of the hardest stage of the Dakar, with big rocks in the track and very soft sand, on brakes that barely worked. They had to reduce pace dramatically, and even doing that, there were curves where the front brakes alone could not stop the car in time and they went straight off the track.</p>
<p>They finished. P15 Challenger, +32:43. Held P11 in the general. The gap rate of 10:31 per 100 km was their second worst of the rally after Stage 4, and this time there was no 15-minute penalty to explain it. Just 280 kilometres of driving a 180-horsepower car through rocks and dunes with almost no brakes.</p>

function render() {
  const app = document.getElementById('app');
  const nav = document.getElementById('nav-inner');
  let html = '';

  // Hero page
  html += `<div class="page active" id="page-hero" data-idx="0">
    <div class="hero-page">
      <span class="hero-number">306</span>
      <div class="hero-content">
        <div class="hero-tag">BBR Motorsport &middot; Taurus T3 Max &middot; Challenger</div>
        <h1>Dakar 2026<br>The Story of Car #306</h1>
        <p class="hero-subtitle">Finishing is the first victory. Everything else is negotiation. P11 Challenger. 58 hours, 17 minutes. 2:33 minutes from the Top 10.</p>
        <div class="hero-meta">

          <span class="hero-meta-item">W2RC Round 1</span>
          <span class="hero-meta-item">January 3\u201317, 2026</span>

          <div class="hero-stat"><div class="hero-stat-value">P54</div><div class="hero-stat-label">Overall</div></div>
          <div class="hero-stat"><div class="hero-stat-value">58h17m</div><div class="hero-stat-label">Total Time</div></div>
          <div class="hero-stat"><div class="hero-stat-value">2:33</div><div class="hero-stat-label">From Top 10</div></div>
        </div>
        <button class="hero-start-btn" onclick="goTo(1)">Read the Story</button>
      </div>
    </div>
  </div>`;

  // Stage pages
  PAGES.forEach((p, i) => {
    if (p.isHero) return;
    const navLink = document.createElement('span');
    navLink.className = 'nav-link';
    navLink.textContent = p.navLabel;
    navLink.dataset.idx = i;
    navLink.onclick = () => goTo(i);
    nav.appendChild(navLink);

    const hasTabs = true;
    const hasResults = p.stageClass || p.genClass;
    const allPhotos = [];
    (p.photoDirs||[]).forEach(d => {
      (PHOTOS[d]||[]).forEach(f => allPhotos.push('photos/' + d + '/' + f));
    });

    html += `<div class="page" id="page-${p.id}" data-idx="${i}">`;
    // Header
    html += `<div class="page-header">
      <div class="page-tag">${p.tag}</div>
      <h2 class="page-title">${p.title}</h2>
      <div class="page-meta">
        ${(p.badges||[]).map(b=>'<span class="page-meta-badge">'+b+'</span>').join('')}
        ${(p.highlightBadges||[]).map(b=>'<span class="page-meta-badge highlight">'+b+'</span>').join('')}
      </div>
    </div>`;

    // Tabs bar
    const jOnly = p.journeyOnly;
    if (!jOnly) {
      html += `<div class="tabs-bar" data-page="${p.id}">
        <button class="tab-btn active" onclick="switchTab('${p.id}','story',this)">Story</button>
        ${hasResults ? `<button class="tab-btn" onclick="switchTab('${p.id}','results',this)">Results</button>` : ''}
        ${allPhotos.length ? `<button class="tab-btn" onclick="switchTab('${p.id}','photos',this)">Photos (${allPhotos.length})</button>` : ''}
      </div>`;
    }

    // Story tab - inject H-prefixed photos inline, sorted by H number
    let storyHtml = p.story;
    const hPhotos = allPhotos
      .filter(src => { const fn = src.split('/').pop(); return /^H\d+_/.test(fn); })
      .sort((a, b) => {
        const na = parseInt(a.split('/').pop().match(/^H(\d+)_/)[1]);
        const nb = parseInt(b.split('/').pop().match(/^H(\d+)_/)[1]);
        return na - nb;
      });
    // Use H-prefixed if available, otherwise auto-pick 3 evenly spaced
    const inlinePhotos = hPhotos.length > 0 ? hPhotos :
      allPhotos.length >= 3 ? [allPhotos[0], allPhotos[Math.floor(allPhotos.length / 3)], allPhotos[Math.floor(allPhotos.length * 2 / 3)]] :
      allPhotos.length >= 1 ? allPhotos.slice(0, allPhotos.length) : [];
    if (inlinePhotos.length > 0) {
      const blocks = storyHtml.split(/(?<=<\/p>|<\/div>)/);
      const n = inlinePhotos.length;
      for (let j = n - 1; j >= 0; j--) {
        const pos = Math.min(Math.floor((j + 1) * blocks.length / (n + 1)), blocks.length - 1);
        blocks.splice(pos, 0, `<div class="story-photo photo-item" onclick="openLightbox(this)"><img src="${inlinePhotos[j]}" alt="" loading="lazy"></div>`);
      }
      storyHtml = blocks.join('');
    }
    if (!jOnly) {
      html += `<div class="tab-content active" id="tab-${p.id}-story">
        <div class="story-content">${storyHtml}</div>
      </div>`;
    }

    // Results tab
    if (hasResults) {
      let rhtml = '<div class="results-content">';
      if (p.resultBoxes) {
        rhtml += '<div class="result-box">';
        p.resultBoxes.forEach(r => rhtml += `<div class="result-item"><div class="result-value">${r.v}</div><div class="result-label">${r.l}</div></div>`);
        if (p.resultNote) rhtml += `<div class="result-note">${p.resultNote}</div>`;
        rhtml += '</div>';
      }
      if (p.stageClass) {
        rhtml += '<div class="standings-wrapper"><div>';
        rhtml += '<div class="standings-title">Stage Classification (CHG)</div>';
        rhtml += tbl(p.stageClass, p.stageOurPos);
        rhtml += '</div>';
        if (p.genClass) {
          rhtml += '<div><div class="standings-title">General Classification (CHG)</div>';
          rhtml += tbl(p.genClass, p.genOurPos);
          rhtml += '</div>';
        }
        rhtml += '</div>';
      }
      rhtml += '</div>';
      html += `<div class="tab-content" id="tab-${p.id}-results">${rhtml}</div>`;
    }

    // Journey tab
    if (p.journey) {
      let jhtml = '<div class="journey-content"><div class="journey-section">';
      jhtml += `<h3 class="journey-title">${p.journey.title}</h3>`;
      jhtml += '<div class="race-record-table"><table class="standings-table journey-table"><thead><tr><th>#</th><th>Date</th><th>Event</th><th>Navigator</th><th>Team</th><th>Category</th><th>Overall</th></tr></thead><tbody>';
      p.journey.sections.forEach(s => {
        jhtml += `<tr class="section-row"><td colspan="7">${s.heading}</td></tr>`;
        s.races.forEach(r => {
          const isDnf = r.cat.startsWith('DNF');
          const cls = isDnf ? ' class="dnf-row"' : '';
          jhtml += `<tr${cls}><td>${r.n}</td><td>${r.date}</td><td class="event-name">${r.event}</td><td>${r.nav}</td><td>${r.team}</td><td class="cat-col${isDnf?' dnf':''}">${r.cat}</td><td>${r.ovr}</td></tr>`;
        });
      });
      jhtml += '</tbody></table></div>';
      if (p.journey.footer) jhtml += `<p class="journey-footer">${p.journey.footer}</p>`;
      jhtml += '</div>';
      jhtml += `<div class="journey-section"><h3 class="journey-title">${p.journey.numbersTitle}</h3><div class="numbers-block">`;
      p.journey.numbers.forEach(n => { jhtml += `<p>${n}</p>`; });
      jhtml += '</div></div></div>';
      if (jOnly) {
        html += jhtml;
      } else {
        html += `<div class="tab-content" id="tab-${p.id}-journey">${jhtml}</div>`;
      }
    }

    // Photos tab
    html += `<div class="tab-content" id="tab-${p.id}-photos">
      <div class="photos-content"><div class="photos-grid" id="grid-${p.id}">
        ${allPhotos.map(src => `<div class="photo-item" onclick="openLightbox(this)"><img src="${src}" alt="" loading="lazy"></div>`).join('')}
      </div></div>
    </div>`;

    // Prev/Next nav
    const prevIdx = i - 1;
    const nextIdx = i + 1 < PAGES.length ? i + 1 : -1;
    html += `<div class="page-nav">
      <button class="page-nav-btn${prevIdx < 0 ? ' hidden':''}" onclick="goTo(${prevIdx})">\u2190 ${prevIdx >= 0 ? PAGES[prevIdx].navLabel || 'Home' : ''}</button>
      <button class="page-nav-btn${nextIdx < 0 ? ' hidden':''}" onclick="goTo(${nextIdx})">${nextIdx >= 0 ? PAGES[nextIdx].navLabel || '' : ''} \u2192</button>
    </div>`;

    html += '</div>';
  });

  app.innerHTML = html;
}

function switchTab(pageId, tabName, btn) {
  const page = document.getElementById('page-' + pageId);
  page.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  page.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + pageId + '-' + tabName).classList.add('active');
  btn.classList.add('active');
}

let currentPage = 0;
function goTo(idx) {
  if (idx < 0 || idx >= PAGES.length) return;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + PAGES[idx].id).classList.add('active');
  document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', parseInt(l.dataset.idx) === idx));
  currentPage = idx;
  window.scrollTo(0, 0);
}

// ── LIGHTBOX ──
let lbPhotos = [], lbIndex = 0;
function getPagePhotos(el) {
  const page = el.closest('.page');
  return page ? Array.from(page.querySelectorAll('.photo-item')) : [el];
}
function showLightboxPhoto() {
  const img = lbPhotos[lbIndex].querySelector('img');
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox-counter').textContent = (lbIndex+1)+' / '+lbPhotos.length;
  document.querySelector('.lightbox-prev').style.display = lbPhotos.length > 1 ? '' : 'none';
  document.querySelector('.lightbox-next').style.display = lbPhotos.length > 1 ? '' : 'none';
}
function openLightbox(el) {
  lbPhotos = getPagePhotos(el);
  lbIndex = lbPhotos.indexOf(el);
  if (lbIndex === -1) lbIndex = 0;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  showLightboxPhoto();
}
function navigateLightbox(dir) {
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  showLightboxPhoto();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function onLightboxClick(e) {
  if (e.target === document.getElementById('lightbox') || e.target === document.getElementById('lightbox-img')) {
    const rect = document.getElementById('lightbox').getBoundingClientRect();
    const x = e.clientX - rect.left;
    const third = rect.width / 3;
    if (lbPhotos.length > 1 && x < third) navigateLightbox(-1);
    else if (lbPhotos.length > 1 && x > third * 2) navigateLightbox(1);
    else closeLightbox();
  }
}
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') navigateLightbox(-1);
    else if (e.key === 'ArrowRight') navigateLightbox(1);
    return;
  }
  if (e.key === 'ArrowLeft' && currentPage > 0) goTo(currentPage - 1);
  else if (e.key === 'ArrowRight' && currentPage < PAGES.length - 1) goTo(currentPage + 1);
});

render();
</script>
</body>
</html>
