<style>

  html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg); }

  body {
    font-family: var(--sans);

    color: var(--text);
    line-height: 1.7;
    font-size: 18px;

  }

  /* ── TOP NAV (stages) ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,12,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; height: 52px; gap: 4px;
    overflow-x: auto; scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-brand {
    font-family: var(--mono); font-weight: 600; font-size: 14px;
    color: var(--accent); white-space: nowrap; margin-right: 12px; letter-spacing: 1px;
    cursor: pointer;
  }
  .nav-link {
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    color: var(--text-muted); text-decoration: none;
    padding: 6px 10px; border-radius: 6px; white-space: nowrap;
    transition: all 0.2s; cursor: pointer; letter-spacing: 0.3px;

  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--accent); background: var(--accent-glow); }
  .lang-switch {

    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    flex-shrink: 0; white-space: nowrap;
  }
  .lang-switch a {
    color: var(--text-muted); text-decoration: none; padding: 4px 8px;
    border-radius: 4px; transition: all 0.2s;
  }
  .lang-switch a:hover { color: var(--text); }
  .lang-switch a.active { color: var(--accent); background: var(--accent-glow); }
  .lang-switch .sep { color: var(--border); }

  /* ── PAGE CONTAINER ── */
  .page { display: none; padding-top: 52px; min-height: 100vh; }
  .page.active { display: block; }

  /* ── PAGE HEADER ── */
  .page-header {
    max-width: 900px; margin: 0 auto; padding: 48px 24px 0;
  }
  .page-tag {
    font-family: var(--mono); font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
  }
  .page-title {
    font-family: var(--display); font-size: clamp(32px, 5vw, 56px);
    font-weight: 400; line-height: 1.1; margin-bottom: 16px;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .page-meta {
    display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;
  }
  .page-meta-badge {
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    color: var(--text-muted); padding: 4px 12px;
    border: 1px solid var(--border); border-radius: 4px;
  }
  .page-meta-badge.highlight {
    color: var(--accent); border-color: var(--accent); background: var(--accent-glow);
  }

  /* ── TABS ── */
  .tabs-bar {
    max-width: 900px; margin: 32px auto 0; padding: 0 24px;
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted);
    padding: 12px 24px; cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── STORY TAB ── */
  .story-content {
    max-width: 900px; margin: 0 auto; padding: 40px 24px 60px;
  }
  .story-content p { margin-bottom: 20px; line-height: 1.8; }
  .highlight-block {
  }
  .highlight-block p { margin-bottom: 0; }
  .highlight-block p + p { margin-top: 12px; }

  /* ── RESULTS TAB ── */
  .results-content {
    max-width: 900px; margin: 0 auto; padding: 40px 24px 60px;
  }
  .result-box {
    display: flex; align-items: center; gap: 32px; padding: 24px 32px;
    margin: 0 0 36px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 12px; flex-wrap: wrap;
  }
  .result-item { text-align: center; }
  .result-value {
    font-family: var(--mono); font-size: 32px; font-weight: 600;
    color: var(--accent); line-height: 1;
  }
  .result-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); margin-top: 6px;
  }
  .result-note {
    font-size: 13px; color: var(--text-muted); font-style: italic;
    flex: 1; min-width: 200px;
  }
  .standings-title {
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    text-align: center; margin-top: 32px; margin-bottom: 8px;
  }
  .standings-wrapper {
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin: 24px 0;
  }
  .standings-table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  .standings-table th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted); text-align: left;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .standings-table td {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .standings-table .our-team td { color: var(--accent); font-weight: 600; }
  .standings-table .spacer-row td {
    border-bottom: none; padding: 4px 16px; color: var(--text-muted);
  }

  /* ── RACE RECORD ── */
  .race-record-table { overflow-x: auto; }
  .race-record { font-size: 13px; }
  .race-record th { font-size: 9px; padding: 10px 12px; white-space: nowrap; }
  .race-record td { padding: 10px 12px; white-space: nowrap; }
  .race-record .rest-row td {
    text-align: center; color: var(--text-muted); font-style: italic;
    border-bottom: 1px solid var(--border); padding: 8px 12px; font-size: 12px;
  }
  .race-record .final-pos { font-weight: 700; }
  .record-summary { text-align: center; }
  @media (max-width: 600px) {
    .race-record { font-size: 11px; }
    .race-record th, .race-record td { padding: 8px 6px; }
  }

  /* ── JOURNEY TAB ── */
  .journey-content {
    max-width: 1000px; margin: 0 auto; padding: 40px 24px 60px;
  }
  .journey-section { margin-bottom: 3rem; }
  .journey-title {
    font-family: var(--heading); font-size: 24px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px; text-align: center;
    margin-bottom: 1.5rem;
  }
  .journey-table { font-size: 13px; }
  .journey-table th { font-size: 9px; padding: 10px 10px; white-space: nowrap; }
  .journey-table td { padding: 10px 10px; }
  .journey-table .section-row td {
    color: var(--accent); font-weight: 700; font-size: 12px;
    font-family: var(--mono); letter-spacing: 1px;
    border-bottom: 1px solid var(--accent); padding: 14px 10px 8px;
    background: rgba(232,101,26,0.05);
  }
  .journey-table .event-name { font-weight: 600; white-space: nowrap; }
  .journey-table .cat-col { color: var(--accent); font-weight: 600; }
  .journey-table .dnf { color: #e85a5a; }
  .journey-table .dnf-row { opacity: 0.7; }
  .journey-footer {
    text-align: center; font-style: italic; color: var(--text-muted);
    margin-top: 1.5rem; font-size: 14px;
  }
  .numbers-block {
    text-align: center; font-size: 15px; line-height: 2;
    color: var(--text-muted); font-style: italic;
  }
  .numbers-block p { margin: 0.3rem 0; }
  @media (max-width: 700px) {
    .journey-table { font-size: 11px; }
    .journey-table th, .journey-table td { padding: 8px 5px; }
    .journey-table .event-name { white-space: normal; }
  }

  /* ── PHOTOS TAB ── */
  .photos-content {
    max-width: 1200px; margin: 0 auto; padding: 40px 24px 60px;
  }
  .photos-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
  }
  .photos-grid .photo-item {
    position: relative; overflow: hidden; border-radius: 8px;
    cursor: pointer; aspect-ratio: 3/2;
  }
  .photos-grid .photo-item img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.5s ease;
  }
  .photos-grid .photo-item:hover img { transform: scale(1.03); }

  /* ── INLINE STORY PHOTOS ── */
  .story-photo {
    margin: 32px 0;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
  }
  .story-photo img {
    width: 100%;
    display: block;
    transition: transform 0.5s ease;
  }
  .story-photo:hover img { transform: scale(1.02); }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.95); justify-content: center;
    align-items: center; cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px;
  }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px; background: none;
    border: none; color: white; font-size: 32px; cursor: pointer;
    padding: 8px; line-height: 1;
  }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: white; font-size: 48px; line-height: 1; padding: 8px 16px;
    cursor: pointer; border-radius: 8px; transition: background 0.2s; z-index: 10;

  .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }
  .lightbox-counter {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 13px; color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  /* ── PAGE NAV (prev/next) ── */

    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--text-muted); padding: 12px 24px;
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    background: none; transition: all 0.2s; text-transform: uppercase;

  .page-nav-btn:hover { color: var(--accent); border-color: var(--accent); }
  .page-nav-btn.hidden { visibility: hidden; }

    padding: 80px 24px; position: relative; overflow: hidden;
  }
  .hero-page::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--accent-glow) 0%, transparent 60%),

  .hero-tag {

  .hero-meta-item {
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px;

    border: 1px solid var(--border); border-radius: 20px;

  .hero-stats {

  .hero-stat-value {

  .hero-stat-label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); margin-top: 4px;
  }
  .hero-start-btn {
    font-family: var(--mono); font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    padding: 14px 40px; border: 1px solid var(--accent);
    border-radius: 8px; cursor: pointer; background: none;
    transition: all 0.3s;
  }
  .hero-start-btn:hover { background: var(--accent-glow); }

  /* ── CAREER TABLE ── */
  .career-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .career-table th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted); text-align: left;
    padding: 10px 12px; border-bottom: 1px solid var(--border);
  }
  .career-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
  }
  .career-table tr:hover td { background: rgba(255,255,255,0.02); }
  .career-table .year-header td { color: var(--accent); font-weight: 600; border-bottom: none; padding-top: 20px; }
  .career-table .dnf { color: #e05252; }
  .career-table .result-cat { color: var(--accent); font-weight: 600; }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 40px 24px; border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--text-muted);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .standings-wrapper { grid-template-columns: 1fr; }
    .photos-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .result-box { padding: 20px; gap: 20px; }
    .hero-stats { gap: 24px; }
    .standings-table { font-size: 12px; }
    .standings-table th, .standings-table td { padding: 10px 8px; }
    .nav-brand { margin-right: 8px; }
    .tab-btn { padding: 12px 16px; font-size: 11px; }
  }
</style>
</head>

function tbl(rows, ourPos) {
  let h = '<table class="standings-table"><thead><tr><th>P</th><th>#</th><th>Piloto</th><th>Tempo</th><th>Dif.</th></tr></thead><tbody>';
  const posNum = parseInt(ourPos.replace('P',''));
  rows.forEach(r => {
    const rp = parseInt(r[0].replace('P',''));
    if (rp === posNum && posNum > 10) h += '<tr class="spacer-row"><td colspan="5">&mdash;</td></tr>';
    const cls = r[0] === ourPos && r[2] === 'P. Gon\u00e7alves' ? ' class="our-team"' : '';
    h += `<tr${cls}><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]||''}</td></tr>`;
  });
  return h + '</tbody></table>';
}

{id:'intro', navLabel:'Intro', tag:'Introdu\u00e7\u00e3o', title:'O Caminho at\u00e9 ao Dakar',
 badges:['Pedro Gon\u00e7alves / Hugo Magalh\u00e3es','BBR Motorsport','Taurus T3 Max'],
 highlightBadges:['Carro #306'],
 photoDirs:['Prologue'],
 story:`<p>No dia 21 de Abril de 2023, um Pedro Gon\u00e7alves de 45 anos entrou num modesto Yamaha YXZ1000R num raide cross-country local nas colinas do centro de Portugal. Era a sua estreia absoluta. Vinte meses depois dessa estreia na Ferraria, alinharia na partida do Rali Dakar.</p>
<p>O caminho entre uma corrida Hobby e o Dakar foi pavimentado com ambi\u00e7\u00e3o e m\u00e1quinas partidas. Duas corridas em 2023: o raide da Ferraria e a Baja Portalegre 500, onde terminou P12 em 13 na classe SSV TT2, P42 em 68 \u00e0 geral. Depois seis corridas em 2024, incluindo a sua primeira experi\u00eancia no deserto africano no Yamaha Desert Challenge em Marrocos, onde terminou segundo em oito. A sua primeira ronda W2RC no Rally-Raid Portugal, P14 Challenger em 32. Mas tamb\u00e9m tr\u00eas desist\u00eancias, e um \u00faltimo lugar na sua classe na Baja TT Norte de Portugal. A curva de aprendizagem foi \u00edngreme e implac\u00e1vel.</p>
<div class="highlight-block"><p>Mudou de navegadores, mudou de carros, mudou de equipas. Pedro Ara\u00fajo em 2023. Rui Franco e Lu\u00eds Engeitado a alternarem ao longo de 2024. Depois Hugo Magalh\u00e3es chegou para o Dakar 2025. Hugo estava no extremo oposto do espectro: um co-piloto profissional em ralis de etapas, incluindo WRC, h\u00e1 18 anos.</p></div>
<p>O Dakar 2025 foi a tentativa rookie de Pedro e Hugo, e n\u00e3o foi uma estreia f\u00e1cil. Uma embraiagem partida na Etapa 6 atirou-os para a categoria Dakar Experience, e o mesmo problema atacou de novo na Etapa 11, deixando-os fora da corrida. A desilus\u00e3o foi devastadora. Os contratempos continuaram. Mas depois o Fenic deu lugar a um Taurus T3 Max quando Pedro se juntou \u00e0 BBR Motorsport em Julho de 2025. E de repente: P6 Challenger no Rally-Raid Portugal, P5 na Baja Marrocos, P5 no Rallye du Maroc. Tr\u00eas top-seis consecutivos na categoria para fechar a temporada de 2025.</p>
<p>Agora era 3 de Janeiro de 2026. O seu 48\u00ba anivers\u00e1rio. E o segundo Dakar estava prestes a come\u00e7ar.</p>
<p>A fam\u00edlia de Pedro estava na Ar\u00e1bia Saudita, passaram alguns dias de descanso juntos antes do rali come\u00e7ar. A 3 de Janeiro, no seu \u00faltimo dia na Ar\u00e1bia, estiveram no p\u00f3dio de partida a ver Pedro descer a rampa em direc\u00e7\u00e3o ao deserto, o in\u00edcio da aventura para a qual todos tinham trabalhado.</p>`,

{id:'shakedown', navLabel:'Shakedown', tag:'Shakedown & Verifica\u00e7\u00f5es \u00b7 1\u20132 Janeiro', title:'Prepara\u00e7\u00f5es Finais em Yanbu',

 story:`<p>Antes de um \u00fanico quil\u00f3metro competitivo, havia trabalho a fazer. Os primeiros dois dias de Janeiro foram dedicados aos rituais que precedem cada Dakar: o teste de shakedown, verifica\u00e7\u00f5es administrativas, e a scrutineering t\u00e9cnica.</p>
<p>A 1 de Janeiro, o shakedown \u2014 uma volta de teste curta e controlada num percurso designado perto do bivouac. N\u00e3o uma corrida, mas uma oportunidade de sentir o carro em terreno saudita pela primeira vez, de verificar que todos os sistemas funcionavam como previsto ap\u00f3s a longa viagem desde Portugal. Suspens\u00e3o, resposta do motor, equipamento de navega\u00e7\u00e3o, intercom \u2014 tudo testado em condi\u00e7\u00f5es reais.</p>
<p>O dia 2 de Janeiro foi dedicado \u00e0s verifica\u00e7\u00f5es. A equipa passou pela scrutineering em Yanbu. Cada detalhe do Taurus T3 Max foi inspeccionado \u2014 equipamento de seguran\u00e7a, arco de seguran\u00e7a, cintos, extintores, instrumentos de navega\u00e7\u00e3o, sistemas de rastreamento. O carro tinha de cumprir os regulamentos da FIA at\u00e9 ao mil\u00edmetro. Para Pedro e Hugo, foi tamb\u00e9m o momento de recolher as credenciais, verificar a documenta\u00e7\u00e3o, e confirmar oficialmente a inscri\u00e7\u00e3o como carro #306.</p>
<div class="highlight-block"><p>Para a BBR Motorsport, estes dois dias foram para garantir que nada ficava ao acaso. Os mec\u00e2nicos fizeram as suas verifica\u00e7\u00f5es finais. Pedro e Hugo entraram nas suas rotinas: posi\u00e7\u00e3o do banco, tens\u00e3o dos cintos, o ritmo da comunica\u00e7\u00e3o entre piloto e navegador. Tudo tinha de ser uma segunda natureza antes da bandeira cair.</p></div>
<p>Ao fim do dia 2 de Janeiro, o carro #306 estava aprovado, testado e estacionado no bivouac. A manh\u00e3 seguinte \u2014 o 48\u00ba anivers\u00e1rio de Pedro \u2014 traria o Pr\u00f3logo.</p>`,

 story:`<p>A rampa de partida. As c\u00e2maras. O sol saudita sobre a costa do Mar Vermelho. Pedro e Hugo sa\u00edram de Yanbu como o 88\u00ba carro, em direc\u00e7\u00e3o a 22 quil\u00f3metros de canyons e sec\u00e7\u00f5es rochosas. Um pr\u00f3logo curto, desenhado para definir a ordem de partida para os dias seguintes.</p>

{id:'stage1', navLabel:'E1', tag:'Etapa 1 \u00b7 4 Janeiro', title:'Pelos Canyons',

 photoDirs:['2026-01-04'],
 story:`<p>A partir do 92\u00ba lugar, no fundo do pelot\u00e3o, Pedro e Hugo entraram nos canyons arenosos a oeste de Yanbu. Lindos canyons a alternar entre r\u00e1pido e muito r\u00e1pido, depois pistas rochosas degradadas atrav\u00e9s de wadis reformados pelas chuvas recentes. Ap\u00f3s uma paragem nas boxes a meio, a etapa terminaria na areia e nas primeiras dunas do Dakar 2026.</p>

<p>Depois, nos \u00faltimos 60 quil\u00f3metros, perderam pot\u00eancia. Pedro tinha mudado para o Mapa 4 do motor, e o carro parecia n\u00e3o ter trac\u00e7\u00e3o dianteira. Dunas que deviam ser rotina tornaram-se uma luta, com o Taurus a esfor\u00e7ar-se para subir onde devia ter atacado.</p>
<p>Apesar de lutar com o carro durante 305 quil\u00f3metros, terminaram P12 em 37 Challengers, a +13:53 do vencedor da etapa. Um resultado s\u00f3lido a esconder uma m\u00e1quina preocupante.</p>`,

{id:'stage3', navLabel:'E3', tag:'Etapa 3 \u00b7 6 Janeiro', title:'A Subida Mais Alta',
 badges:['Al-Ula \u2192 Al-Ula','421 km SS'],highlightBadges:['P6/37 CHG','+20:01'],
 photoDirs:['2026-01-06'],
 story:`<p>Os magn\u00edficos canyons arenosos de Al-Ula. O briefing tinha avisado que a navega\u00e7\u00e3o ia ter um papel principal: as pistas tinham praticamente desaparecido nos planaltos vazios, apagadas por meses de chuva. Superf\u00edcies sinuosas em gravilha, com ritmos e terreno a mudar regularmente entre planaltos e canyons.</p>
<p>A partir do 48\u00ba, Pedro e Hugo empurraram por 421 quil\u00f3metros e tiveram um furo. Custou-lhes cerca de cinco minutos. Mesmo assim terminaram P6 Challenger na etapa e subiram a P7 na geral, P45 \u00e0 geral absoluta em quase 200 carros. A sua melhor posi\u00e7\u00e3o na classifica\u00e7\u00e3o geral de todo o rali.</p>
<div class="highlight-block"><p>Mas havia um sen\u00e3o. O seu tempo de etapa caiu fora da janela dos 107% face ao vencedor de etapa Challenger. Pelas regras do Dakar, isso significava ser empurrado para tr\u00e1s na ordem de partida da etapa seguinte. Em vez de partirem novamente perto do 48\u00ba, em linha com a sua classifica\u00e7\u00e3o geral, seriam atirados para o fundo da fila.</p>
<p>E a etapa seguinte era a maratona.</p></div>`,
 resultBoxes:[{v:'P6',l:'Etapa CHG'},{v:'P7',l:'Geral CHG'},{v:'+20:01',l:'Dif. P1'}],

{id:'stage4', navLabel:'E4', tag:'Etapa 4 \u00b7 Maratona 1a \u00b7 7 Janeiro', title:'A Maratona Come\u00e7a',
 badges:['Al-Ula \u2192 Marathon Bivouac','452 km SS'],highlightBadges:['P16/36 CHG','+1:08:21'],
 photoDirs:['2026-01-07'],
 story:`<p>A primeira etapa maratona. Canyons arenosos fora de pista, depois terreno mais plano com navega\u00e7\u00e3o CAP intensa em planaltos rochosos e acidentados, depois magn\u00edficos planaltos arenosos com ritmo alternado e pistas sinuosas. Depois desta etapa, n\u00e3o haveria equipa, n\u00e3o haveria mec\u00e2nicos, n\u00e3o haveria apoio. Apenas uma tenda no deserto e uma ra\u00e7\u00e3o militar.</p>
<p>Pedro e Hugo partiram do 76\u00ba. Empurrados quase 30 posi\u00e7\u00f5es para tr\u00e1s daquilo que mereceriam pela regra dos 107%, atr\u00e1s de v\u00e1rios cami\u00f5es e carros mais lentos de outras categorias. Mais p\u00f3, mais tr\u00e1fego, mais ve\u00edculos a entupir pistas estreitas onde ultrapassar era imposs\u00edvel.</p>
<div class="highlight-block"><p>Por volta do KP 140, ficaram presos numa fila de carros e cami\u00f5es que se arrastavam por uma sec\u00e7\u00e3o estreita de canyon cheia de pedras. O carro que liderava a fila cometeu um erro de navega\u00e7\u00e3o, saiu da rota, e Pedro seguiu. Quando se aperceberam, era tarde demais. Tinham falhado um waypoint. Pedro tomou a decis\u00e3o t\u00e1ctica: n\u00e3o valia a pena voltar atr\u00e1s \u00e0 procura dele. Aceitar a penaliza\u00e7\u00e3o de 15 minutos e continuar.</p></div>
<p>Por volta do KP 231, pouco antes do ponto de reabastecimento, encontraram uma sec\u00e7\u00e3o estreita. N\u00e3o mais de cinco metros de largura. Outro carro estava encalhado na areia, a bloquear a passagem. Pedro tentou passar e o Taurus ficou encravado lado a lado com o outro carro, ambos enterrados na areia num corredor mal com espa\u00e7o para um ve\u00edculo. Vinte minutos. Ficaram ali parados durante vinte minutos enquanto o rali seguia sem eles. Eventualmente, locais chegaram com um 4x4 e uma corda e libertaram-nos.</p>
<p>Na meta, a penaliza\u00e7\u00e3o de 15 minutos pelo waypoint foi aplicada ao seu tempo. Combinada com os 20 minutos perdidos encalhados e o tempo perdido na fila do canyon, terminaram P16 Challenger na etapa, a +1:08:21 do vencedor. Perderam cerca de 45 minutos s\u00f3 em incidentes.</p>
<p>Mas o paradoxo do Dakar: apesar da pior etapa do seu rali, subiram a P6 na classifica\u00e7\u00e3o geral Challenger. Outros tinham sofrido ainda mais.</p>
<p>Pedro conduziu o Taurus para o marathon bivouac enquanto o sol descia atr\u00e1s do planalto saudita. Sem equipa \u00e0 espera. Sem mec\u00e2nicos. Apenas o deserto, um ref\u00fagio, e o que conseguissem transportar.</p>`,
 resultBoxes:[{v:'P16',l:'Etapa CHG'},{v:'P6',l:'Geral CHG'},{v:'+1:08:21',l:'Dif. P1'}],

{id:'stage5', navLabel:'E5', tag:'Etapa 5 \u00b7 Maratona 1b \u00b7 8 Janeiro', title:'Feridos mas de P\u00e9',
 badges:['Marathon Bivouac \u2192 Ha\u2019il','356 km SS'],highlightBadges:['P21/36 CHG','+34:41'],
 photoDirs:['2026-01-08'],
 story:`<p>A segunda metade da maratona. A partir do 103\u00ba, o mais atr\u00e1s de todo o rali. Pistas sinuosas arenosas a degradarem-se em passagens pedregosas com navega\u00e7\u00e3o complicada. Grandes vales arenosos at\u00e9 \u00e0 neutraliza\u00e7\u00e3o, depois terreno acidentado e pequenos vales a exigir uma escolha de rota cuidadosa.</p>
<p>Tr\u00eas problemas. Um furo. Uma penaliza\u00e7\u00e3o de 6 minutos por zona de velocidade, estavam dentro de uma \u00e1rea restrita e n\u00e3o se aperceberam durante algum tempo, exactamente o tipo de armadilha que o briefing tinha assinalado. E na parte final da etapa, a direc\u00e7\u00e3o partiu parcialmente.</p>
<p>Terminaram P21 Challenger na etapa, a +34:41 do vencedor. Ca\u00edram de P6 para P9 na classifica\u00e7\u00e3o geral. Acumularam 21 minutos de penaliza\u00e7\u00f5es em duas etapas.</p>
<p>Mas terminaram. Conduziram o Taurus ferido para o bivouac de Ha\u2019il onde, pela primeira vez desde que sa\u00edram de Al-Ula, a equipa BBR completa e os mec\u00e2nicos estavam \u00e0 espera. A maratona estava terminada. Os mec\u00e2nicos substitu\u00edram a direc\u00e7\u00e3o partida e come\u00e7aram a trabalhar para preparar o carro para o dia mais longo do rali.</p>`,

{id:'stage6', navLabel:'E6', tag:'Etapa 6 \u00b7 9 Janeiro', title:'Rumo a Riade',
 badges:['Ha\u2019il \u2192 Riade','326 km SS (920 km total)'],highlightBadges:['P11/36 CHG','+25:49'],
 photoDirs:['2026-01-09'],
 story:`<p>Uma etapa 100% areia. Dunas o dia todo. O briefing foi inequ\u00edvoco: alternar entre sec\u00e7\u00f5es de alta velocidade nas dunas e sec\u00e7\u00f5es de pista entre ergs r\u00e1pidos, com dunas partidas avisadas no roadbook. A etapa total mais longa do rali com 920 quil\u00f3metros incluindo liaisons, embora o sector cronometrado fosse de 326 km. Uma paragem de reabastecimento a dois ter\u00e7os da dist\u00e2ncia.</p>
<p>A partir do 100\u00ba, ainda no fundo do pelot\u00e3o devido \u00e0s consequ\u00eancias da maratona, Pedro e Hugo entraram nas dunas com um novo problema. A direc\u00e7\u00e3o assistida estava gradualmente a falhar. Era um problema diferente da direc\u00e7\u00e3o partida na Etapa 5, que os mec\u00e2nicos tinham substitu\u00eddo. Este era algo progressivo, com a direc\u00e7\u00e3o a ficar cada vez mais pesada ao longo da etapa. Num dia s\u00f3 de areia e dunas, onde cada mudan\u00e7a de direc\u00e7\u00e3o e cada correc\u00e7\u00e3o numa duna exige que a direc\u00e7\u00e3o responda, o carro estava a lutar contra Pedro com for\u00e7a crescente.</p>
<p>A meio da etapa, Pedro pensava que o carro estava prestes a morrer. Mas sobreviveu.</p>
<p>Os \u00faltimos 10 quil\u00f3metros foram percorridos no escuro. As luzes n\u00e3o funcionavam bem, havia muito p\u00f3, e o briefing tinha avisado que esta era uma zona de navega\u00e7\u00e3o dif\u00edcil. Partir em 100\u00ba significava estarem entre os \u00faltimos a chegar \u00e0 meta, e a essa altura o sol j\u00e1 tinha desaparecido.</p>
<p>Terminaram P11 Challenger na etapa, a +25:49. Mantiveram P9 na geral. Depois veio a liaison mais longa do rali: a viagem at\u00e9 Riade, e o dia de descanso.</p>`,

{id:'rest', navLabel:'Descanso', tag:'Dia de Descanso', title:'Vivos',
 badges:['Riade','10 Janeiro 2026'],highlightBadges:['P9 CHG \u00b7 P52 Geral'],
 photoDirs:['2026-01-10'],
 story:`<p>P9 Challenger. P52 \u00e0 geral. Seis etapas feitas, sete por fazer. Os mec\u00e2nicos tiveram um dia inteiro para trabalhar no Taurus: a direc\u00e7\u00e3o assistida, o selector do mapa do motor que ainda n\u00e3o tinha mostrado o pior, e o desgaste acumulado de um carro que j\u00e1 tinha passado por canyons, dunas, direc\u00e7\u00e3o partida, furos, e 20 minutos encravado numa passagem de cinco metros de largura.</p>
<p>Pedro chegou ao dia de descanso com a moral em alta. A primeira semana tinha-lhes atirado de tudo: problemas mec\u00e2nicos desde a Etapa 1, um furo na Etapa 3, o desastre do canyon na Etapa 4, uma noite de maratona no deserto, direc\u00e7\u00e3o partida na Etapa 5, direc\u00e7\u00e3o assistida a falhar nas dunas na Etapa 6, a conduzir os \u00faltimos 10 km no escuro. Seis desist\u00eancias na carreira tinham ensinado a Pedro e Hugo o que mais importava. N\u00e3o a posi\u00e7\u00e3o no painel de tempos. N\u00e3o a diferen\u00e7a para o l\u00edder. Apenas o acto de chegar ao pr\u00f3ximo bivouac com um carro que pudesse arrancar na manh\u00e3 seguinte.</p>
<div class="highlight-block"><p>Estavam em P9 Challenger. Vivos. E a segunda semana ainda n\u00e3o tinha come\u00e7ado.</p></div>`,
 resultBoxes:[{v:'P9',l:'Challenger'},{v:'P52',l:'Geral'},{v:'6/6',l:'Etapas Feitas'}],

{id:'stage7', navLabel:'E7', tag:'Etapa 7 \u00b7 11 Janeiro', title:'A Manter Posi\u00e7\u00e3o',
 badges:['Riade \u2192 Wadi Ad-Dawasir','459 km SS'],highlightBadges:['P15/35 CHG','+18:13'],
 photoDirs:['2026-01-11'],
 story:`<p>A segunda semana come\u00e7ou com a etapa mais longa para sul do rali, no geral muito r\u00e1pida. Vales largos com pistas bem marcadas para come\u00e7ar, depois alta velocidade com navega\u00e7\u00e3o trai\u00e7oeira atrav\u00e9s de uma regi\u00e3o com muitas pistas, depois sec\u00e7\u00f5es fora de pista onde as pedras se tornaram mais presentes e os canyons estreitaram. O p\u00f3 foi significativo. S\u00f3 os \u00faltimos quil\u00f3metros permitiriam novamente velocidades altas.</p>
<p>Antes do sector selectivo sequer come\u00e7ar, Pedro e Hugo tiveram que substituir um pneu por precau\u00e7\u00e3o. Tinha perdido alguma press\u00e3o na liaison.</p>
<p>Depois veio o problema principal. O selector do mapa do motor estava avariado. Desde o in\u00edcio da etapa, alternava aleatoriamente entre Mapa 2 (pot\u00eancia normal de corrida), Mapa 4 (pot\u00eancia reduzida, desenhado para combust\u00edvel de octanas mais baixas), e at\u00e9 Mapa 1, a defini\u00e7\u00e3o de pot\u00eancia mais baixa, destinada apenas a liaisons em estrada, n\u00e3o a competi\u00e7\u00e3o. Pedro ia a empurrar por um vale r\u00e1pido a todo o ritmo e o motor ca\u00eda subitamente para pot\u00eancia de liaison. Numa etapa de 459 km onde a velocidade era tudo, o carro sabotava-se aleatoriamente a si pr\u00f3prio.</p>
<p>Apesar da pot\u00eancia imprevis\u00edvel, terminaram P15 Challenger, a +18:13 do vencedor. Mantiveram-se em P9 na geral, sem altera\u00e7\u00f5es.</p>`,

{id:'stage8', navLabel:'E8', tag:'Etapa 8 \u00b7 12 Janeiro', title:'483 Quil\u00f3metros',
 badges:['Wadi Ad-Dawasir','483 km SS'],highlightBadges:['P14/35 CHG','+22:36'],
 photoDirs:['2026-01-12'],
 story:`<p>O sector selectivo mais longo de todo o Dakar 2026. 483 quil\u00f3metros por uma paisagem completa e variada: um in\u00edcio r\u00e1pido, depois cinturas de dunas a quebrar o ritmo, vales espectaculares, sec\u00e7\u00f5es mais rochosas a norte, mudan\u00e7as frequentes de terreno, e pistas sinuosas. O briefing tinha-a chamado de bonita. Tamb\u00e9m foi implac\u00e1vel.</p>
<p>O selector do mapa do motor continuava avariado, a mudar aleatoriamente entre mapas de pot\u00eancia sem aviso. O mesmo problema da Etapa 7, por resolver. Mas a Etapa 8 trouxe outra coisa: cansa\u00e7o. Dez dias dentro do rali, na etapa cronometrada mais longa, Pedro sentiu o peso cumulativo de tudo. Os problemas das mudan\u00e7as desde a Etapa 1. O desastre do canyon na Etapa 4. As noites da maratona. A direc\u00e7\u00e3o assistida a falhar. O motor a cair de pot\u00eancia sem raz\u00e3o. 483 quil\u00f3metros \u00e9 muito tempo para concentra\u00e7\u00e3o quando o corpo est\u00e1 a dizer que j\u00e1 chega.</p>
<p>Terminaram P14 Challenger, a +22:36. Mantiveram P10 na geral. O cansa\u00e7o teve impacto directo no ritmo, mas geriram a etapa e mantiveram o carro intacto para a segunda maratona.</p>`,
 resultBoxes:[{v:'P14',l:'Etapa CHG'},{v:'P10',l:'Geral CHG'},{v:'+22:36',l:'Dif. P1'}],

{id:'stage9', navLabel:'E9', tag:'Etapa 9 \u00b7 Maratona 2a \u00b7 13 Janeiro', title:'O Melhor da Segunda Semana',
 badges:['Wadi Ad-Dawasir \u2192 Marathon Refuge','410 km SS'],highlightBadges:['P8/35 CHG','+24:08'],
 photoDirs:['2026-01-13'],
 story:`<p>A segunda sequ\u00eancia de maratona come\u00e7ou. Terreno geralmente r\u00e1pido: canyons no in\u00edcio, depois sec\u00e7\u00f5es abertas e mais r\u00e1pidas, areia discreta a princ\u00edpio mas muito mole em alguns s\u00edtios, depois dunas no final. O fio comum entre todos os itiner\u00e1rios era a areia.</p>
<div class="highlight-block"><p>Antes mesmo da etapa come\u00e7ar, drama. Na liga\u00e7\u00e3o inicial entre a liaison e o sector selectivo, os trav\u00f5es dianteiros sobre-pressurizaram e bloquearam completamente o carro. Pedro e Hugo n\u00e3o se conseguiam mexer. Tiveram que tirar uma roda, desmontar as pastilhas dos trav\u00f5es, libertar a press\u00e3o, e voltar a montar tudo. Um problema mec\u00e2nico que nada tinha a ver com a condu\u00e7\u00e3o, resolvido com ferramentas e calma no p\u00f3 \u00e0 berma da pista.</p></div>
<p>Resolvidos os trav\u00f5es, o sector selectivo de 410 km foi limpo. Sem problemas. E o resultado mostrou-o: P8 Challenger na etapa, +24:08, o seu melhor resultado de etapa da segunda semana. Quando o carro funcionava e a tripula\u00e7\u00e3o estava livre de incidentes, o ritmo era genuinamente forte.</p>
<p>Pedro conduziu para o bivouac da segunda maratona. A mesma rotina da primeira: Hugo verificou o carro, Pedro montou as tendas, ra\u00e7\u00f5es militares, cedo para a cama. Sem drama. O deserto estava a tornar-se familiar.</p>`,
 resultBoxes:[{v:'P8',l:'Etapa CHG'},{v:'P8',l:'Geral CHG'},{v:'+24:08',l:'Dif. P1'}],

{id:'stage10', navLabel:'E10', tag:'Etapa 10 \u00b7 Maratona 2b \u00b7 14 Janeiro', title:'A Escolha Estrat\u00e9gica',
 badges:['Marathon Refuge \u2192 Bisha','420 km SS'],highlightBadges:['P13/35 CHG','+35:50'],
 photoDirs:['2026-01-14'],
 story:`<p>A grande etapa de areia. O briefing tinha-a apresentado como a segunda etapa dedicada \u00e0 areia do rali, com categorias a arrancar em paralelo de frente para as dunas. Dunas regulares ao princ\u00edpio, com ergs e planaltos r\u00e1pidos fora de pista, mas \u00e0 medida que a etapa progrediu as dunas mudaram de car\u00e1cter. Areia mole e exigente que requeria uma gest\u00e3o cuidada do combust\u00edvel. Sec\u00e7\u00f5es de vai-e-vem numa travessia de wadi com p\u00f3 tipo fesh-fesh a exigir vigil\u00e2ncia. Dunas alaranjadas a ganhar altura, com passagens entre pedras escuras. Depois planaltos mais r\u00e1pidos e sec\u00e7\u00f5es mais sinuosas e rochosas at\u00e9 \u00e0 meta.</p>
<p>A sair da segunda noite de maratona sem mec\u00e2nicos, num carro que lhes tinha dado problemas todo o rali, Pedro e Hugo fizeram uma escolha deliberada: ser conservadores. Proteger o carro. Proteger a chegada. N\u00e3o correr riscos nas dunas moles que pudessem acabar com o rali a tr\u00eas dias de Yanbu.</p>
<p>Olhando para tr\u00e1s, foi provavelmente demasiado conservador. Houve ritmo deixado em cima da mesa. Mas depois de tudo o que tinha acontecido, ser cuidadoso na etapa de areia mais dura do Dakar foi uma decis\u00e3o racional. Podiam dar-se ao luxo de perder posi\u00e7\u00f5es. N\u00e3o se podiam dar ao luxo de perder o carro.</p>
<p>Terminaram P13 Challenger, a +35:50. Ca\u00edram de P8 para P11 na classifica\u00e7\u00e3o geral. A maratona estava terminada. A equipa BBR completa estava \u00e0 espera em Bisha. Faltavam tr\u00eas etapas.</p>`,
 resultBoxes:[{v:'P13',l:'Etapa CHG'},{v:'P11',l:'Geral CHG'},{v:'+35:50',l:'Dif. P1'}],

{id:'stage11', navLabel:'E11', tag:'Etapa 11 \u00b7 15 Janeiro', title:'Faltam Duas Etapas',
 badges:['Bisha \u2192 Al Henakiyah','346 km SS'],highlightBadges:['P16/33 CHG','+17:30'],
 photoDirs:['2026-01-15'],
 story:`<p>Planaltos com pouca varia\u00e7\u00e3o de terreno, mas uma das etapas mais r\u00e1pidas da edi\u00e7\u00e3o de 2026. Uma velocidade m\u00e9dia muito alta que tinha que ser gerida com cuidado para evitar armadilhas de navega\u00e7\u00e3o no terreno aberto. O p\u00f3 dos dias anteriores tinha varrido as pistas. Sectores rochosos nos primeiros 150 quil\u00f3metros. Acampamentos n\u00f3madas instalados na zona.</p>
<p>Os trav\u00f5es dianteiros bloquearam de novo na liga\u00e7\u00e3o por estrada, o mesmo problema de sobre-pressuriza\u00e7\u00e3o da Etapa 9. Desta vez, a equipa de assist\u00eancia estava l\u00e1 para ajudar porque a liaison era partilhada com os ve\u00edculos de apoio, e o apoio era permitido pelos regulamentos. Resolveram-no antes do sector selectivo.</p>
<p>Durante a etapa, houve pequenos problemas com o sistema de intercom, os microfones e auriculares montados no capacete que permitem ao piloto e ao navegador comunicar. Numa etapa onde as armadilhas de navega\u00e7\u00e3o no terreno aberto r\u00e1pido eram o principal perigo, ter problemas de comunica\u00e7\u00e3o entre Pedro e Hugo adicionou uma camada extra de dificuldade. Hugo precisava de soltar as instru\u00e7\u00f5es do roadbook com clareza, e Pedro precisava de as ouvir.</p>
<p>Apesar do susto dos trav\u00f5es e dos problemas do intercom, o ritmo normalizado foi forte: cerca de 5:04 por 100 km de diferen\u00e7a, quase exactamente a sua refer\u00eancia limpa. Uma vez no sector selectivo, o carro andou e a tripula\u00e7\u00e3o cumpriu. P16 Challenger, +17:30. Mantiveram P11 na geral. Faltavam duas etapas.</p>`,

{id:'stage12', navLabel:'E12', tag:'Etapa 12 \u00b7 16 Janeiro', title:'280 km Sem Trav\u00f5es',
 badges:['Al Henakiyah \u2192 Yanbu','311 km SS'],highlightBadges:['P15/33 CHG','+32:43'],
 photoDirs:['2026-01-16'],
 story:`<p>O exame final. O briefing tinha-o chamado de um resumo de todos os tipos de terreno saudita, sem margem para aproxima\u00e7\u00f5es: condu\u00e7\u00e3o, navega\u00e7\u00e3o e travessias t\u00e9cnicas fariam deste dia o desafio m\u00e1ximo. Pistas largas e a derrapar, depois travessias de wadi mais lentas com terreno mais acidentado. Dunas com areia mole. Sec\u00e7\u00f5es t\u00e9cnicas rochosas e estreitas, quase \u00e0 trial. Mais dunas, mais moles que as primeiras. Vales com pedras. Terreno aberto r\u00e1pido. Pequenas dunas dif\u00edceis. Depois uma sec\u00e7\u00e3o muito acidentada at\u00e9 \u00e0 meta. Tudo o que o Dakar tinha para oferecer, comprimido em 311 quil\u00f3metros.</p>
<p>Tornou-se numa das etapas mais dif\u00edceis de todo o rali para o carro #306.</p>
<p>Um furo nos primeiros 10 quil\u00f3metros. Depois, por volta do KP 30, perderam press\u00e3o nos trav\u00f5es traseiros. Uma fuga no circuito traseiro dos trav\u00f5es. Pedro e Hugo tiveram que fechar o circuito traseiro por completo e percorrer os restantes 280 quil\u00f3metros apenas com os trav\u00f5es dianteiros, que estavam muito fracos.</p>
<p>280 quil\u00f3metros da etapa mais dif\u00edcil do Dakar, com pedras grandes na pista e areia muito mole, em trav\u00f5es que mal funcionavam. Tiveram que reduzir o ritmo drasticamente, e mesmo assim, houve curvas em que os trav\u00f5es dianteiros sozinhos n\u00e3o conseguiam parar o carro a tempo e foram em frente para fora da pista.</p>
<p>Terminaram. P15 Challenger, +32:43. Mantiveram P11 na geral. O r\u00e1cio de diferen\u00e7a de 10:31 por 100 km foi o seu segundo pior do rali depois da Etapa 4, e desta vez n\u00e3o havia uma penaliza\u00e7\u00e3o de 15 minutos para o explicar. Apenas 280 quil\u00f3metros a conduzir um carro de 180 cavalos por pedras e dunas quase sem trav\u00f5es.</p>
<p><em>Falta uma etapa. 105 quil\u00f3metros entre eles e a meta em Yanbu.</em></p>`,

{id:'stage13', navLabel:'E13', tag:'Etapa 13 \u00b7 Final \u00b7 17 Janeiro', title:'105 km at\u00e9 \u00e0 Meta',
 badges:['Yanbu \u2192 Yanbu','105 km SS'],highlightBadges:['P11/33 CHG','+4:14'],
 photoDirs:['2026-01-17'],
 story:`<p>Vales arenosos, sec\u00e7\u00f5es rochosas, pistas costeiras. 105 quil\u00f3metros de regresso a Yanbu e ao Mar Vermelho. A etapa final do Rali Dakar 2026.</p>
<p>Limpa. Sem problemas. Levaram-no a casa.</p>
<p>Mas a etapa trazia uma \u00faltima pancada. Algures pelo percurso, Pedro e Hugo passaram pelo carro destru\u00eddo de David Zille, o seu colega de equipa na BBR. Um acidente enorme. O carro estava completamente destru\u00eddo. Durante duas horas depois de terminar, n\u00e3o sabiam se ele estava bem.</p>
<p>O Zille estava bem. O seu carro estava destru\u00eddo, e teve que ser rebocado at\u00e9 \u00e0 meta, mas estava ileso. Foi classificado em P10 Challenger, 2 minutos e 33 segundos \u00e0 frente de Pedro. O colega de equipa cujo acidente tinham testemunhado na etapa final era o homem que os manteve fora do top 10.</p>
<p>Pedro e Hugo cruzaram a meta em Yanbu. P11 Challenger em 33 chegadas de 37 partidas. P54 \u00e0 geral em 152 chegadas de 202 partidas. Tempo total: 58 horas, 17 minutos e 19 segundos. 22 minutos de penaliza\u00e7\u00f5es. 2 minutos e 33 segundos do top 10.</p>`,

{id:'epilogue', navLabel:'Epílogo', tag:'Epílogo', title:'Glória, e Fome',
 badges:['Yanbu'],highlightBadges:['P11 Challenger','P54/152 Geral','58h 17m 19s'],
 photoDirs:['Epilogue'],
 story:`<p>Na meta, Pedro sentiu-se orgulhoso. Orgulhoso da progressão de uma corrida Hobby no Raid Ferraria a P11 Challenger no Dakar. Orgulhoso de ser um finisher do Dakar, um ano depois da desistência que tinha deixado assuntos por resolver no deserto saudita. Orgulhoso de cada etapa sobrevivida, cada problema resolvido, cada nascer do sol visto de trás do volante de um Taurus T3 Max no meio do nada.</p>
<p>Mas também pensou no quão perto tinha chegado do top 10. 2 minutos e 33 segundos. Os 20 minutos preso na passagem estreita da Etapa 4 foram oito vezes essa diferença. A penalização de 15 minutos pelo waypoint foi seis vezes. A penalização de velocidade de 6 minutos na Etapa 5 foi mais do dobro. Qualquer um dos incidentes de todo o rali, evitado, tê-lo-ia colocado dentro do top 10.</p>
<p>Olhando para trás, podia ter empurrado um pouco mais. A Etapa 10, a abordagem conservadora nas dunas, tinha custado posições que nunca voltaram. Mas o Dakar ensina humildade antes da ambição. Terminar é a primeira vitória. Tudo o resto é negociação.</p>
<p>No Campeonato W2RC Challenger, o Dakar deu a Pedro 11 pontos e a 10ª posição na classificação. Dois meses depois, no Rally-Raid Portugal, terminaria em P4 Challenger, o seu melhor resultado W2RC de sempre. A trajectória que começou na Ferraria continuou a subir. O que reserva o futuro?</p>`,

function render() {
  const app = document.getElementById('app');
  const nav = document.getElementById('nav-inner');
  let html = '';

  // Hero page
  html += `<div class="page active" id="page-hero" data-idx="0">
    <div class="hero-page">
      <span class="hero-number">306</span>
      <div class="hero-content">
        <div class="hero-tag">BBR Motorsport &middot; Taurus T3 Max &middot; Challenger</div>
        <h1>Dakar 2026<br>A Hist\u00f3ria do Carro #306</h1>
        <p class="hero-subtitle">Terminar \u00e9 a primeira vit\u00f3ria. Tudo o resto \u00e9 negocia\u00e7\u00e3o. P11 Challenger. 58 horas, 17 minutos. A 2:33 do Top 10.</p>
        <div class="hero-meta">
          <span class="hero-meta-item">Rali Dakar 2026</span>
          <span class="hero-meta-item">W2RC Ronda 1</span>
          <span class="hero-meta-item">3\u201317 Janeiro 2026</span>
          <span class="hero-meta-item">Yanbu \u2192 Yanbu</span>
        </div>
        <div class="hero-stats">
          <div class="hero-stat"><div class="hero-stat-value">P11</div><div class="hero-stat-label">Challenger</div></div>
          <div class="hero-stat"><div class="hero-stat-value">P54</div><div class="hero-stat-label">Geral</div></div>
          <div class="hero-stat"><div class="hero-stat-value">58h17m</div><div class="hero-stat-label">Tempo Total</div></div>
          <div class="hero-stat"><div class="hero-stat-value">2:33</div><div class="hero-stat-label">Do Top 10</div></div>
        </div>
        <button class="hero-start-btn" onclick="goTo(1)">Ler a Hist\u00f3ria</button>
      </div>
    </div>
  </div>`;

  // Stage pages
  PAGES.forEach((p, i) => {
    if (p.isHero) return;
    const navLink = document.createElement('span');
    navLink.className = 'nav-link';
    navLink.textContent = p.navLabel;
    navLink.dataset.idx = i;
    navLink.onclick = () => goTo(i);
    nav.appendChild(navLink);

    const hasTabs = true;
    const hasResults = p.stageClass || p.genClass;
    const allPhotos = [];
    (p.photoDirs||[]).forEach(d => {
      (PHOTOS[d]||[]).forEach(f => allPhotos.push('photos/' + d + '/' + f));
    });

    html += `<div class="page" id="page-${p.id}" data-idx="${i}">`;
    // Header
    html += `<div class="page-header">
      <div class="page-tag">${p.tag}</div>
      <h2 class="page-title">${p.title}</h2>
      <div class="page-meta">
        ${(p.badges||[]).map(b=>'<span class="page-meta-badge">'+b+'</span>').join('')}
        ${(p.highlightBadges||[]).map(b=>'<span class="page-meta-badge highlight">'+b+'</span>').join('')}
      </div>
    </div>`;

    // Tabs bar
    const jOnly = p.journeyOnly;
    if (!jOnly) {
      html += `<div class="tabs-bar" data-page="${p.id}">
        <button class="tab-btn active" onclick="switchTab('${p.id}','story',this)">História</button>
        ${hasResults ? `<button class="tab-btn" onclick="switchTab('${p.id}','results',this)">Resultados</button>` : ''}
        ${allPhotos.length ? `<button class="tab-btn" onclick="switchTab('${p.id}','photos',this)">Fotos (${allPhotos.length})</button>` : ''}
      </div>`;
    }

    // Story tab - inject H-prefixed photos inline, sorted by H number
    let storyHtml = p.story;
    const hPhotos = allPhotos
      .filter(src => { const fn = src.split('/').pop(); return /^H\d+_/.test(fn); })
      .sort((a, b) => {
        const na = parseInt(a.split('/').pop().match(/^H(\d+)_/)[1]);
        const nb = parseInt(b.split('/').pop().match(/^H(\d+)_/)[1]);
        return na - nb;
      });
    // Use H-prefixed if available, otherwise auto-pick 3 evenly spaced
    const inlinePhotos = hPhotos.length > 0 ? hPhotos :
      allPhotos.length >= 3 ? [allPhotos[0], allPhotos[Math.floor(allPhotos.length / 3)], allPhotos[Math.floor(allPhotos.length * 2 / 3)]] :
      allPhotos.length >= 1 ? allPhotos.slice(0, allPhotos.length) : [];
    if (inlinePhotos.length > 0) {
      const blocks = storyHtml.split(/(?<=<\/p>|<\/div>)/);
      const n = inlinePhotos.length;
      for (let j = n - 1; j >= 0; j--) {
        const pos = Math.min(Math.floor((j + 1) * blocks.length / (n + 1)), blocks.length - 1);
        blocks.splice(pos, 0, `<div class="story-photo photo-item" onclick="openLightbox(this)"><img src="${inlinePhotos[j]}" alt="" loading="lazy"></div>`);
      }
      storyHtml = blocks.join('');
    }
    if (!jOnly) {
      html += `<div class="tab-content active" id="tab-${p.id}-story">
        <div class="story-content">${storyHtml}</div>
      </div>`;
    }

    // Results tab
    if (hasResults) {
      let rhtml = '<div class="results-content">';
      if (p.resultBoxes) {
        rhtml += '<div class="result-box">';
        p.resultBoxes.forEach(r => rhtml += `<div class="result-item"><div class="result-value">${r.v}</div><div class="result-label">${r.l}</div></div>`);
        if (p.resultNote) rhtml += `<div class="result-note">${p.resultNote}</div>`;
        rhtml += '</div>';
      }
      if (p.stageClass) {
        rhtml += '<div class="standings-wrapper"><div>';
        rhtml += '<div class="standings-title">Classificação da Etapa (CHG)</div>';
        rhtml += tbl(p.stageClass, p.stageOurPos);
        rhtml += '</div>';
        if (p.genClass) {
          rhtml += '<div><div class="standings-title">Classificação Geral (CHG)</div>';
          rhtml += tbl(p.genClass, p.genOurPos);
          rhtml += '</div>';
        }
        rhtml += '</div>';
      }
      rhtml += '</div>';
      html += `<div class="tab-content" id="tab-${p.id}-results">${rhtml}</div>`;
    }

    // Journey tab
    if (p.journey) {
      let jhtml = '<div class="journey-content"><div class="journey-section">';
      jhtml += `<h3 class="journey-title">${p.journey.title}</h3>`;
      jhtml += '<div class="race-record-table"><table class="standings-table journey-table"><thead><tr><th>#</th><th>Data</th><th>Evento</th><th>Navegador</th><th>Equipa</th><th>Categoria</th><th>Geral</th></tr></thead><tbody>';
      p.journey.sections.forEach(s => {
        jhtml += `<tr class="section-row"><td colspan="7">${s.heading}</td></tr>`;
        s.races.forEach(r => {
          const isDnf = r.cat.startsWith('DNF');
          const cls = isDnf ? ' class="dnf-row"' : '';
          jhtml += `<tr${cls}><td>${r.n}</td><td>${r.date}</td><td class="event-name">${r.event}</td><td>${r.nav}</td><td>${r.team}</td><td class="cat-col${isDnf?' dnf':''}">${r.cat}</td><td>${r.ovr}</td></tr>`;
        });
      });
      jhtml += '</tbody></table></div>';
      if (p.journey.footer) jhtml += `<p class="journey-footer">${p.journey.footer}</p>`;
      jhtml += '</div>';
      jhtml += `<div class="journey-section"><h3 class="journey-title">${p.journey.numbersTitle}</h3><div class="numbers-block">`;
      p.journey.numbers.forEach(n => { jhtml += `<p>${n}</p>`; });
      jhtml += '</div></div></div>';
      if (jOnly) {
        html += jhtml;
      } else {
        html += `<div class="tab-content" id="tab-${p.id}-journey">${jhtml}</div>`;
      }
    }

    // Photos tab
    html += `<div class="tab-content" id="tab-${p.id}-photos">
      <div class="photos-content"><div class="photos-grid" id="grid-${p.id}">
        ${allPhotos.map(src => `<div class="photo-item" onclick="openLightbox(this)"><img src="${src}" alt="" loading="lazy"></div>`).join('')}
      </div></div>
    </div>`;

    // Prev/Next nav
    const prevIdx = i - 1;
    const nextIdx = i + 1 < PAGES.length ? i + 1 : -1;
    html += `<div class="page-nav">
      <button class="page-nav-btn${prevIdx < 0 ? ' hidden':''}" onclick="goTo(${prevIdx})">\u2190 ${prevIdx >= 0 ? PAGES[prevIdx].navLabel || 'In\u00edcio' : ''}</button>
      <button class="page-nav-btn${nextIdx < 0 ? ' hidden':''}" onclick="goTo(${nextIdx})">${nextIdx >= 0 ? PAGES[nextIdx].navLabel || '' : ''} \u2192</button>
    </div>`;

    html += '</div>';
  });

  app.innerHTML = html;
}

function switchTab(pageId, tabName, btn) {
  const page = document.getElementById('page-' + pageId);
  page.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  page.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + pageId + '-' + tabName).classList.add('active');
  btn.classList.add('active');
}

let currentPage = 0;
function goTo(idx) {
  if (idx < 0 || idx >= PAGES.length) return;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + PAGES[idx].id).classList.add('active');
  document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', parseInt(l.dataset.idx) === idx));
  currentPage = idx;
  window.scrollTo(0, 0);
}

// ── LIGHTBOX ──
let lbPhotos = [], lbIndex = 0;
function getPagePhotos(el) {
  const page = el.closest('.page');
  return page ? Array.from(page.querySelectorAll('.photo-item')) : [el];
}
function showLightboxPhoto() {
  const img = lbPhotos[lbIndex].querySelector('img');
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox-counter').textContent = (lbIndex+1)+' / '+lbPhotos.length;
  document.querySelector('.lightbox-prev').style.display = lbPhotos.length > 1 ? '' : 'none';
  document.querySelector('.lightbox-next').style.display = lbPhotos.length > 1 ? '' : 'none';
}
function openLightbox(el) {
  lbPhotos = getPagePhotos(el);
  lbIndex = lbPhotos.indexOf(el);
  if (lbIndex === -1) lbIndex = 0;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  showLightboxPhoto();
}
function navigateLightbox(dir) {
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  showLightboxPhoto();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function onLightboxClick(e) {
  if (e.target === document.getElementById('lightbox') || e.target === document.getElementById('lightbox-img')) {
    const rect = document.getElementById('lightbox').getBoundingClientRect();
    const x = e.clientX - rect.left;
    const third = rect.width / 3;
    if (lbPhotos.length > 1 && x < third) navigateLightbox(-1);
    else if (lbPhotos.length > 1 && x > third * 2) navigateLightbox(1);
    else closeLightbox();
  }
}
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') navigateLightbox(-1);
    else if (e.key === 'ArrowRight') navigateLightbox(1);
    return;
  }
  if (e.key === 'ArrowLeft' && currentPage > 0) goTo(currentPage - 1);
  else if (e.key === 'ArrowRight' && currentPage < PAGES.length - 1) goTo(currentPage + 1);
});

render();
</script>
